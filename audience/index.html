<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>ʕ •ᴥ•ʔ：我有話想說</title>
  <link rel="icon" href="/images/favicon.ico">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 32px 24px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 24px;
      color: #222;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 6px;
    }

    input, textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 1rem;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus {
      border-color: #4f86f7;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4f86f7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #3a6fd8;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    #status {
      margin-top: 16px;
      font-size: 0.95rem;
      min-height: 1.4em;
    }

    #status.success { color: #2a9d5c; }
    #status.error   { color: #e03e3e; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ʕ •ᴥ•ʔ：你好啊，這裡可以留言給講者喔</h1>

    <label for="name">暱稱</label>
    <input id="name" type="text" placeholder="請輸入暱稱" maxlength="20" />

    <label for="message">訊息</label>
    <textarea id="message" placeholder="請輸入訊息" maxlength="100"></textarea>

    <button id="submit">送出</button>
    <div id="status"></div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx53SNbbDirY3faABFepmscb6ZJy6wyaq_3SL8DX_3lJemIyvS1s1XHMyPHp_5KSTut/exec";

    const nameInput    = document.getElementById('name');
    const messageInput = document.getElementById('message');
    const submitBtn    = document.getElementById('submit');
    const statusEl     = document.getElementById('status');

    submitBtn.addEventListener('click', async () => {
      const name    = nameInput.value.trim();
      const message = messageInput.value.trim();

      if (!name) {
        showStatus('請填入暱稱', 'error');
        return;
      }
      if (!message) {
        showStatus('請填入訊息', 'error');
        return;
      }

      submitBtn.disabled = true;
      showStatus('送出中...', '');

      try {
        await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ name, message }),
        });
        messageInput.value = '';
        showStatus(`已送出：${message}`, 'success');
      } catch {
        showStatus('送出失敗，請重試', 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });

    function showStatus(text, type) {
      statusEl.textContent = text;
      statusEl.className = type;
    }
  </script>
</body>
</html>
