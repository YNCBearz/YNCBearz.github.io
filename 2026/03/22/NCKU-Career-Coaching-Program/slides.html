    function textToArray(s) {
      var i = s.length, n = 0, ba = [];
      for (var j = 0; j < i;) {
        var c = s.codePointAt(j);
        if (c < 128)        { ba[n++] = c; j++; }
        else if (c < 2048)  { ba[n++] = (c >> 6) | 192;  ba[n++] = (c & 63)  | 128; j++; }
        else if (c < 65536) { ba[n++] = (c >> 12) | 224; ba[n++] = ((c >> 6) & 63) | 128; ba[n++] = (c & 63) | 128; j++; }
        else { ba[n++] = (c >> 18) | 240; ba[n++] = ((c >> 12) & 63) | 128; ba[n++] = ((c >> 6) & 63) | 128; ba[n++] = (c & 63) | 128; j += 2; }
      }
      return new Uint8Array(ba);
    }

    function hexToArray(s) {
      return new Uint8Array(s.match(/[\da-f]{2}/gi).map(h => parseInt(h, 16)));
    }

    async function tryDecrypt(password) {
      const raw     = await cryptoObj.subtle.importKey('raw', textToArray(password), { name: 'PBKDF2' }, false, ['deriveBits']);
      const keyBits = await cryptoObj.subtle.deriveBits({ name: 'PBKDF2', salt: keySalt, iterations: 1024, hash: 'SHA-256' }, raw, 256);
      const ivBits  = await cryptoObj.subtle.deriveBits({ name: 'PBKDF2', salt: ivSalt,  iterations: 512,  hash: 'SHA-256' }, raw, 128);
      const aesKey  = await cryptoObj.subtle.importKey('raw', keyBits, { name: 'AES-CBC' }, false, ['decrypt']);
      try {
        const buf = await cryptoObj.subtle.decrypt({ name: 'AES-CBC', iv: new Uint8Array(ivBits) }, aesKey, hexToArray(encryptedData));

    }

    async function verifyHmac(keyBits, plaintext) {
      const hmacKey = await cryptoObj.subtle.importKey('raw', keyBits, { name: 'HMAC', hash: 'SHA-256' }, false, ['verify']);
      return cryptoObj.subtle.verify('HMAC', hmacKey, hexToArray(hmacDigest), textToArray(plaintext));
    }

    async function submitPassword() {
      const password = document.getElementById('password-input').value;
      const errorDiv = document.getElementById('error-msg');
      const btn      = document.getElementById('submit-btn');
      btn.disabled = true;
      errorDiv.textContent = '';

      const result = await tryDecrypt(password);
      if (!result || !result.text.startsWith(knownPrefix)) {
        errorDiv.textContent = wrongPassMessage;
        btn.disabled = false;
        return;
      }

      if (!await verifyHmac(result.keyBits, result.text)) errorDiv.textContent = wrongHashMessage;

      showSlides(result.text.slice(knownPrefix.length));

    function showSlides(markdownContent) {
      document.getElementById('slides-content').textContent = markdownContent;
      document.getElementById('password-gate').style.display  = 'none';
      document.getElementById('reveal-wrapper').style.display = 'block';
      document.getElementById('back-link').style.display      = 'block';
      
      Reveal.initialize({
        hash: true, slideNumber: true, transition: 'slide',
        center: true, margin: 0.02, width: 1280, height: 720,
        plugins: [RevealMarkdown, RevealHighlight, RevealNotes],
        highlight: { highlightOnLoad: true, escapeHTML: false },
        markdown: { smartypants: true },
      });
      Reveal.on('ready', function() {
        document.querySelectorAll('pre code').forEach(function(block) {
          block.classList.add('hljs-line-numbers');
          const lines = block.innerHTML.split('\n');
          let numberedCode = '';
          for (let i = 0; i < lines.length; i++) {
            numberedCode += '<span class="line-number">' + (i + 1) + '</span>' + lines[i] + '\n';
          }
          block.innerHTML = numberedCode;
        });
      });
    }

    document.addEventListener('DOMContentLoaded', function() {
      const saved = localStorage.getItem(storageName);
      if (saved) {
        document.getElementById('password-input').value = saved;
        submitPassword();
      } else {
        document.getElementById('password-input').addEventListener('keydown', e => {
