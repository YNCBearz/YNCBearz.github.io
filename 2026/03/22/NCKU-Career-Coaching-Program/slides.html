          for (var i = 0; i < LANES; i++) {
            if (timers[i]) { clearTimeout(timers[i]); timers[i] = null; }
            var inner = document.getElementById('chat-marquee-inner-' + i);
            if (inner) inner.style.animationPlayState = 'paused';
          }
        } else {
          for (var i = 0; i < LANES; i++) {
            if (isAnimating[i]) {
              var remaining = timerEndTime[i] ? timerEndTime[i] - Date.now() : 0;
              if (remaining <= 0) {
                isAnimating[i] = false;
                showNext(i);
              } else {
                var inner = document.getElementById('chat-marquee-inner-' + i);
                if (inner) inner.style.animationPlayState = 'running';
                (function(lane, rem) {
                  timers[lane] = setTimeout(function() {
                    timers[lane] = null;
                    timerEndTime[lane] = null;
                    var marquee = document.getElementById('chat-marquee-' + lane);
                    if (queues[lane].length === 0 && marquee) marquee.style.display = 'none';
                    showNext(lane);
                  }, rem);
                })(i, remaining);
              }
            } else if (queues[i].length > 0) {
              showNext(i);
            }
          }
        }
      }

      var btn = document.getElementById('bs-play-btn');
      if (btn) btn.addEventListener('click', togglePlay);

      setInterval(poll, POLL_INTERVAL);
      poll();
    })();
    }

    document.addEventListener('DOMContentLoaded', function() {
      const saved = localStorage.getItem(storageName);
      if (saved) {
        document.getElementById('password-input').value = saved;
        submitPassword();
      } else {
        document.getElementById('password-input').addEventListener('keydown', e => {
          if (e.key === 'Enter') submitPassword();
        });
      }
    });
  </script>
</body>
</html>
